<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrievo | Onboarding</title>
    <link rel="stylesheet" href="static/css/base-style.css">
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="close-btn">X</div>
            </div>
            <nav class="nav-links">
                <a href="index.html">Browse Items</a>
                <a href="profile.html">My profile</a>
                <a href="notifications.html">Notifications</a>
                <a href="report.html">Report item</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="menu-icon" id="openMenu">☰</div>
                <div class="title">Retrievo</div>
                <div class="login-container">
                    <button type="button" class="login-btn" data-google-login>Login with Google</button>
                    <button type="button" class="logout-btn" data-logout-button hidden>Logout</button>
                </div>
            </header>

            <section class="content">
                <h1>Complete Your Onboarding</h1>
                <p class="onboarding-subtitle">Set your hostel and at least one contact method before posting items.</p>

                <div class="form-container onboarding-form-container">
                    <p id="onboardingStatus" class="onboarding-status">Checking your onboarding status...</p>

                    <form id="onboardingForm">
                        <div class="form-group">
                            <label for="onboardingHostel">Hostel</label>
                            <select id="onboardingHostel" required>
                                <option value="">Select your hostel</option>
                                <option value="boys">Boys</option>
                                <option value="girls">Girls</option>
                            </select>
                            <p id="hostelLockNote" class="onboarding-hint" hidden>Your hostel is already set and cannot
                                be changed.</p>
                        </div>

                        <div class="form-group">
                            <label for="onboardingPhone">Phone Number (optional)</label>
                            <input type="tel" id="onboardingPhone" placeholder="+919876543210" autocomplete="tel">
                            <p class="onboarding-hint">Use E.164 format: +&lt;countrycode&gt;&lt;number&gt;</p>
                        </div>

                        <div class="form-group">
                            <label for="onboardingInstagram">Instagram ID (optional)</label>
                            <input type="text" id="onboardingInstagram" placeholder="username" autocomplete="off">
                        </div>

                        <button type="submit" class="btn-primary">Complete Onboarding</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="static/js/main.js"></script>
</body>

</html>
