<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrievo Admin</title>
    <link rel="stylesheet" href="static/css/base-style.css">
    <link rel="stylesheet" href="static/css/admin.css">
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="close-btn">X</div>
            </div>
            <nav class="nav-links">
                <a href="index.html">Browse Items</a>
                <a href="profile.html">My profile</a>
                <a href="notifications.html">Notifications</a>
                <a href="report.html">Report item</a>
                <a href="admin.html" class="active" data-admin-link="true">Admin Page</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="menu-icon" id="openMenu">☰</div>
                <div class="title">Retrievo</div>
                <div class="login-container">
                    <button type="button" class="login-btn" data-google-login>Login with Google</button>
                    <button type="button" class="logout-btn" data-logout-button hidden>Logout</button>
                </div>
            </header>

            <section class="content admin-content">
                <div class="admin-header">
                    <h1>Admin Moderation</h1>
                    <button id="adminRefreshBtn" class="btn-secondary" type="button">Refresh</button>
                </div>
                <p id="adminState" class="admin-state">Loading admin tools...</p>

                <div id="adminPanels" class="admin-panels" hidden>
                    <article class="admin-panel">
                        <h2>Recent Activity</h2>
                        <div id="activityList" class="stack-list"></div>
                    </article>

                    <article class="admin-panel">
                        <h2>Users</h2>
                        <p class="panel-note">Actions available: warn, temporary ban, unban.</p>
                        <div id="userList" class="stack-list"></div>
                    </article>

                    <article class="admin-panel">
                        <h2>Reported Items</h2>
                        <div id="reportedItemsList" class="stack-list"></div>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="static/js/main.js"></script>
</body>

</html>
