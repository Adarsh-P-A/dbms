<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrievo</title>

    <link rel="stylesheet" href="static/css/base-style.css">
    <link rel="stylesheet" href="static/css/resolution.css">
</head>

<body>

    <div class="container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="close-btn">X</div>
            </div>
            <nav class="nav-links">
                <a href="index.html">Browse Items</a>
                <a href="profile.html">My profile</a>
                <a href="notifications.html" class="active">Notifications</a>
                <a href="report.html">Report item</a>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="main-content">

            <!-- TOP BAR -->
            <header class="top-bar">
                <div class="menu-icon" id="openMenu">☰</div>
                <div class="title">Retrievo</div>
                <div class="login-container">
                    <button type="button" class="login-btn" data-google-login>Login with Google</button>
                    <button type="button" class="logout-btn" data-logout-button hidden>Logout</button>
                </div>
            </header>

            <section class="content">
                <div id="resolutionDetailState" class="resolution-detail-state">Loading resolution details...</div>
                
                <div id="resolutionDetailContent" hidden>
                    <a href="notifications.html" class="back-link">← Back to Notifications</a>
                    
                    <h1>Resolution Request <span id="resolutionStatus" class="status-badge"></span></h1>
                    <p class="subtitle" id="resolutionSubtitle"></p>

                    <div class="card">
                        <h3>Finder's / Claimer's Contact Details</h3>
                        <div id="finderDetails"></div>
                    </div>

                    <div class="btn-group">
                        <button id="completeButton" class="complete" style="display: none;">Mark as Completed</button>
                        <button id="approveButton" class="approve" style="display: none;">Approve</button>
                        <button id="rejectButton" class="reject" style="display: none;">Reject / Item Doesn't Match</button>
                        <button id="invalidateButton" class="invalidate" style="display: none;">Invalidate</button>
                    </div>

                    <div class="card">
                        <h3>Description</h3>
                        <p id="resolutionDescription"></p>
                        <br />
                        <p class="small">Submitted: <span id="resolutionSubmittedDate"></span></p>
                    </div>

                    <div class="card">
                        <h3>Item Details</h3>

                        <div class="item-box">
                            <img id="itemImageDetail" src="" alt="item">

                            <div>
                                <p><strong id="itemTitleDetail"></strong></p>
                                <p class="small">Category: <span id="itemCategory"></span></p>
                                <p class="small">Location: <span id="itemLocationDetail"></span></p>
                                <p class="small">Date: <span id="itemDateDetail"></span></p>
                            </div>
                        </div>

                    </div>
                </div>

            </section>

        </main>

    </div>

    <script type="module" src="static/js/main.js"></script>
    <script type="module" src="static/js/resolution-detail.js"></script>
</body>

</html>
