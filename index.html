<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrievo</title>
    <link rel="stylesheet" href="static/css/base-style.css">
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="close-btn">X</div>
            </div>
            <nav class="nav-links">
                <a href="index.html" class="active">Browse Items</a>
                <a href="profile.html">My profile</a>
                <a href="notifications.html">Notifications</a>
                <a href="report.html">Report item</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="menu-icon" id="openMenu">☰</div>
                <div class="title">Retrievo</div>
                <div class="login-container">
                    <button type="button" class="login-btn" data-google-login>Login with Google</button>
                    <button type="button" class="logout-btn" data-logout-button hidden>Logout</button>
                </div>
            </header>

            <section class="content">
                <h1>Recent Items</h1>
                
                <!-- Search and Filter Bar -->
                <div class="search-filter-container">
                    <div class="search-box">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input" 
                            placeholder="Search items by title, location, date..."
                            autocomplete="off"
                        >
                    </div>
                    <select id="categoryFilter" class="category-filter">
                        <option value="">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="bags">Bags</option>
                        <option value="keys">Keys</option>
                        <option value="wallets">Wallets</option>
                        <option value="documents">Documents</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <p id="itemsState" class="items-state">Loading recent items...</p>
                <div class="items-grid" id="itemsGrid">
                    <div class="item-card">
                        <div class="image-placeholder"></div>
                        <div class="card-info">
                            <div class="line short"></div>
                            <div class="line long"></div>
                        </div>
                    </div>
                    <div class="item-card">
                        <div class="image-placeholder"></div>
                        <div class="card-info">
                            <div class="line short"></div>
                            <div class="line long"></div>
                        </div>
                    </div>
                    <div class="item-card">
                        <div class="image-placeholder"></div>
                        <div class="card-info">
                            <div class="line short"></div>
                            <div class="line long"></div>
                        </div>
                    </div>
                    <div class="item-card">
                        <div class="image-placeholder"></div>
                        <div class="card-info">
                            <div class="line short"></div>
                            <div class="line long"></div>
                        </div>
                    </div>
                    <div class="item-card">
                        <div class="image-placeholder"></div>
                        <div class="card-info">
                            <div class="line short"></div>
                            <div class="line long"></div>
                        </div>
                    </div>
                    <div class="item-card">
                        <div class="image-placeholder"></div>
                        <div class="card-info">
                            <div class="line short"></div>
                            <div class="line long"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="static/js/main.js"></script>
</body>

</html>
