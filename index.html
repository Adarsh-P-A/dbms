<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrievo</title>
    <link rel="stylesheet" href="static/css/base-style.css">
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="close-btn">X</div>
            </div>
            <nav class="nav-links">
                <a href="index.html" class="active">Browse Items</a>
                <a href="profile.html">My profile</a>
                <a href="notifications.html">Notifications</a>
                <a href="report.html">Report item</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="menu-icon" id="openMenu">☰</div>
                <div class="title">Retrievo</div>
                <div class="login-container">
                    <span>login</span>
                </div>
            </header>

            <section class="content">
                <h1>Recent Items</h1>
                
                <div class="controls" style="margin-bottom: 20px; display: flex; gap: 10px;">
                    <input type="text" id="searchInput" placeholder="Search by title or place..." style="padding: 8px; flex: 1;">
                    <select id="categoryFilter" style="padding: 8px;">
                        <option value="all">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="bags">Bags</option>
                        <option value="key">Key & wallet</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="items-grid" id="itemsGrid">
                    </div>
            </section>
        </main>
    </div>

    <script type="module" src="static/js/script_index.js"></script>
</body>

</html>
