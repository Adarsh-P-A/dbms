<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrievo</title>
    <link rel="stylesheet" href="static/css/base-style.css">
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="close-btn">X</div>
            </div>
            <nav class="nav-links">
                <a href="index.html">Browse Items</a>
                <a href="profile.html">My profile</a>
                <a href="notifications.html">Notifications</a>
                <a href="report.html" class="active">Report item</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="menu-icon" id="openMenu">☰</div>
                <div class="title">Retrievo</div>
                <div class="login-container">
                    <span>login</span>
                </div>
            </header>

            <section class="content">
                <h1>Report an Item</h1>
                <div class="form-container">
                        <form id="reportForm">

      <!-- Title -->
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="title" placeholder="Short descriptive title" required>
        </div>

        <!-- Category -->
        <div class="form-group">
            <label>Category</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option>Electronics</option>
                <option>Clothing</option>
                <option>Bags</option>
                <option>Keys & Wallets</option>
                <option>Documents</option>
                <option>Others</option>
            </select>
        </div>

        <!-- Type -->
        <div class="form-group">
            <label>Type</label>
            <select id="type" required>
                <option value="">Select Type</option>
                <option>Lost</option>
                <option>Found</option>
            </select>
        </div>

        <!-- Visibility -->
        <div class="form-group">
            <label>Visibility</label>
            <select id="visibility" required>
                <option value="">Select Visibility</option>
                <option>Public</option>
                <option>Boys</option>
                <option>Girls</option>
            </select>
        </div>

        <!-- Location -->
        <div class="form-group">
            <label>Location</label>
            <select id="location" required>
                <option value="">Select Location</option>

                <optgroup label="Central Campus">
                    <option>NLHC</option>
                    <option>ELHC</option>
                    <option>ECLHC</option>
                    <option>Main Ground</option>
                    <option>Main Building</option>
                    <option>OAT</option>
                    <option>Rajpath</option>
                    <option>Basketball Court</option>
                    <option>ABC Halls</option>
                    <option>Auditorium</option>
                </optgroup>

                <optgroup label="Hostels">
                    <option>A Hostel</option>
                    <option>B Hostel</option>
                    <option>C Hostel</option>
                    <option>D Hostel</option>
                    <option>E Hostel</option>
                    <option>F Hostel</option>
                    <option>G Hostel</option>
                    <option>MBH 1</option>
                    <option>MBH 2</option>
                    <option>LH</option>
                    <option>MLH</option>
                    <option>PG Hostel 1</option>
                    <option>PG Hostel 2</option>
                </optgroup>

                <optgroup label="Labs & Departments">
                    <option>IT Complex</option>
                    <option>CCC</option>
                    <option>Mech Labs</option>
                    <option>Civil Labs</option>
                    <option>Production Labs</option>
                    <option>CSED</option>
                    <option>ECED</option>
                    <option>EEE</option>
                    <option>Mechanical</option>
                    <option>Civil</option>
                    <option>Biotechnology</option>
                    <option>Production</option>
                    <option>Material Science</option>
                    <option>Engineering Physics</option>
                    <option>Architecture</option>
                    <option>Mathematics</option>
                    <option>Physics</option>
                </optgroup>
            </select>
        </div>

        <!-- Date -->
        <div class="form-group">
            <label>Date</label>
            <input type="date" id="date" required>
        </div>

        <!-- Description -->
        <div class="form-group">
            <label>Description</label>
            <textarea id="description" rows="4" placeholder="Enter details..." required></textarea>
        </div>

        <!-- Image -->
        <div class="form-group">
            <label>Upload Image</label>
            <input type="file" id="imageInput" accept="image/*">
            <br><br>
            <img id="preview" width="150" style="display:none; border-radius:10px;">
        </div>

        <button type="submit" class="btn-primary">Submit Report</button>

                </form>

                </div>
            </section>
        </main>
    </div>

    <script src="static/js/script.js"></script>
</body>

</html>
