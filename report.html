<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrievo</title>
    <link rel="stylesheet" href="static/css/base-style.css">
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="close-btn">X</div>
            </div>
            <nav class="nav-links">
                <a href="index.html">Browse Items</a>
                <a href="profile.html">My profile</a>
                <a href="onboarding.html">Complete onboarding</a>
                <a href="notifications.html">Notifications</a>
                <a href="report.html" class="active">Report item</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="menu-icon" id="openMenu">☰</div>
                <div class="title">Retrievo</div>
                <div class="login-container">
                    <button type="button" class="login-btn" data-google-login>Login with Google</button>
                    <button type="button" class="logout-btn" data-logout-button hidden>Logout</button>
                </div>
            </header>

            <section class="content">
                <h1>Report an Item</h1>
                <div class="form-container">
                    <form id="reportForm">

                        <!-- Title -->
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" id="title" placeholder="Short descriptive title" minlength="2"
                                maxlength="20" required>
                        </div>

                        <!-- Category -->
                        <div class="form-group">
                            <label>Category</label>
                            <select id="category" required>
                                <option value="">Select Category</option>
                                <option value="electronics">Electronics</option>
                                <option value="clothing">Clothing</option>
                                <option value="bags">Bags</option>
                                <option value="keys-wallets">Keys & Wallets</option>
                                <option value="documents">Documents</option>
                                <option value="others">Others</option>
                            </select>
                        </div>

                        <!-- Type -->
                        <div class="form-group">
                            <label>Type</label>
                            <select id="type" required>
                                <option value="">Select Type</option>
                                <option value="lost">Lost</option>
                                <option value="found">Found</option>
                            </select>
                        </div>

                        <!-- Visibility -->
                        <div class="form-group">
                            <label>Visibility</label>
                            <select id="visibility" required>
                                <option value="">Select Visibility</option>
                                <option value="public">Public</option>
                                <option value="boys">Boys</option>
                                <option value="girls">Girls</option>
                            </select>
                        </div>

                        <!-- Location -->
                        <div class="form-group">
                            <label>Location</label>
                            <select id="location" required>
                                <option value="">Select Location</option>

                                <optgroup label="Central Campus">
                                    <option value="nlhc">NLHC</option>
                                    <option value="elhc">ELHC</option>
                                    <option value="eclhc">ECLHC</option>
                                    <option value="main_ground">Main Ground</option>
                                    <option value="main_building">Main Building</option>
                                    <option value="oat">OAT</option>
                                    <option value="rajpath">Rajpath</option>
                                    <option value="bb_court">Basketball Court</option>
                                    <option value="aryabhatta">Aryabhatta Hall</option>
                                    <option value="bhaskara">Bhaskara Hall</option>
                                    <option value="chanakya">Chanakya Hall</option>
                                    <option value="audi">Auditorium</option>
                                </optgroup>

                                <optgroup label="Hostels">
                                    <option value="hostel_a">A Hostel</option>
                                    <option value="hostel_b">B Hostel</option>
                                    <option value="hostel_c">C Hostel</option>
                                    <option value="hostel_d">D Hostel</option>
                                    <option value="hostel_e">E Hostel</option>
                                    <option value="hostel_f">F Hostel</option>
                                    <option value="hostel_g">G Hostel</option>
                                    <option value="mbh1">MBH 1</option>
                                    <option value="mbh2">MBH 2</option>
                                    <option value="lh">LH</option>
                                    <option value="mlh">MLH</option>
                                    <option value="pg1">PG Hostel 1</option>
                                    <option value="pg2">PG Hostel 2</option>
                                </optgroup>

                                <optgroup label="Labs & Departments">
                                    <option value="it_complex">IT Complex</option>
                                    <option value="ccc">CCC</option>
                                    <option value="mech_lab">Mech Labs</option>
                                    <option value="civil_lab">Civil Labs</option>
                                    <option value="production_lab">Production Labs</option>
                                    <option value="csed">CSED</option>
                                    <option value="eced">ECED</option>
                                    <option value="eeed">EEE</option>
                                    <option value="med">Mechanical</option>
                                    <option value="ced">Civil</option>
                                    <option value="btd">Biotechnology</option>
                                    <option value="ped">Production</option>
                                    <option value="mtd">Material Science</option>
                                    <option value="egd">Engineering Physics</option>
                                    <option value="arch">Architecture</option>
                                    <option value="maths">Mathematics</option>
                                    <option value="physics">Physics</option>
                                </optgroup>
                            </select>
                        </div>

                        <!-- Date -->
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="date" required>
                        </div>

                        <!-- Description -->
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="description" rows="4" placeholder="Enter details..." minlength="20"
                                maxlength="280" required></textarea>
                        </div>

                        <!-- Image -->
                        <div class="form-group">
                            <label>Upload Image</label>
                            <input type="file" id="imageInput" accept="image/*" required>
                            <br><br>
                            <img id="preview" width="150" style="display:none; border-radius:10px;">
                        </div>

                        <button type="submit" class="btn-primary">Submit Report</button>

                    </form>

                </div>
            </section>
        </main>
    </div>

    <script type="module" src="static/js/main.js"></script>
</body>

</html>
