<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details - Retrievo</title>
    <link rel="stylesheet" href="static/css/base-style.css">
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="close-btn">X</div>
            </div>
            <nav class="nav-links">
                <a href="index.html">Browse Items</a>
                <a href="profile.html">My profile</a>
                <a href="notifications.html">Notifications</a>
                <a href="report.html">Report item</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="menu-icon" id="openMenu">☰</div>
                <div class="title">Retrievo</div>
                <div class="login-container">
                    <button type="button" class="login-btn" data-google-login>Login with Google</button>
                    <button type="button" class="logout-btn" data-logout-button hidden>Logout</button>
                </div>
            </header>

            <section class="content">
                <div id="itemDetailState" class="item-detail-state">Loading item details...</div>
                
                <div id="itemDetailContent" hidden>
                    <a href="index.html" class="back-link">← Back to Items</a>
                    
                    <div class="item-detail-container">
                        <div class="item-detail-image">
                            <img id="itemImage" src="" alt="Item image">
                        </div>
                        
                        <div class="item-detail-info">
                            <div class="item-detail-badge" id="itemBadge"></div>
                            <h1 id="itemTitle"></h1>
                            
                            <div class="item-detail-section">
                                <h3>Description</h3>
                                <p id="itemDescription"></p>
                            </div>
                            
                            <div class="item-detail-section">
                                <h3>Details</h3>
                                <p><strong>Visibility:</strong> <span id="itemVisibility"></span></p>
                                <p><strong>Type:</strong> <span id="itemType"></span></p>
                                <p><strong>Category:</strong> <span id="itemCategory"></span></p>
                                <p><strong>Location:</strong> <span id="itemLocation"></span></p>
                                <p><strong>Date:</strong> <span id="itemDate"></span></p>
                            </div>
                            
                            <div class="item-detail-section">
                                <h3>Posted By</h3>
                                <p id="itemOwnerInfo"></p>
                            </div>
                            
                            <div class="item-detail-actions" id="itemActions">
                                <button id="claimButton" class="btn-primary" style="display: none;">Claim / Report Found</button>
                                <button id="reportButton" class="btn-secondary" style="display: none;">Report Item</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

        </main>

    </div>

    <!-- Message Modal -->
    <div id="messageModal" class="modal" hidden>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add a Message</h2>
                <button type="button" class="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="messageInput" class="message-input" placeholder="Add any additional information..." rows="6"></textarea>
                <div class="message-counter">
                    <span id="charCount">0</span>/280 characters
                </div>
            </div>
            <div class="modal-footer">
                <button id="messageCancelBtn" type="button" class="btn-secondary">Cancel</button>
                <button id="messageSubmitBtn" type="button" class="btn-primary">Submit</button>
            </div>
        </div>
    </div>

    <!-- Report Modal -->
    <div id="reportModal" class="modal" hidden>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Report Item</h2>
                <button type="button" class="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <label for="reportReason" class="modal-label">Select reason:</label>
                <select id="reportReason" class="modal-select">
                    <option value="">Choose a reason...</option>
                </select>
            </div>
            <div class="modal-footer">
                <button id="reportCancelBtn" type="button" class="btn-secondary">Cancel</button>
                <button id="reportSubmitBtn" type="button" class="btn-primary">Report</button>
            </div>
        </div>
    </div>

    <script type="module" src="static/js/main.js"></script>
    <script type="module" src="static/js/item-detail.js"></script>
</body>

</html>
