<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrievo</title>
    <link rel="stylesheet" href="static/css/base-style.css">
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="close-btn">X</div>
            </div>
            <nav class="nav-links">
                <a href="index.html">Browse Items</a>
                <a href="profile.html" class="active">My profile</a>
                <a href="notifications.html">Notifications</a>
                <a href="report.html">Report item</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="menu-icon" id="openMenu">☰</div>
                <div class="title">Retrievo</div>
                <div class="login-container">
                    <button type="button" class="login-btn" data-google-login>Login with Google</button>
                    <button type="button" class="logout-btn" data-logout-button hidden>Logout</button>
                </div>
            </header>

            <section class="content">
                <h1>My Profile</h1>
                <div class="profile-container">
                    <!-- Left Side: Profile Info -->
                    <div class="profile-section-left">
                        <div class="profile-card">
                            <div class="profile-header">
                                <div class="profile-avatar-large" id="profileAvatar">😊</div>
                                <div>
                                    <h2 id="profileName">John Doe</h2>
                                    <p id="profileDepartment">Computer Science Dept.</p>
                                </div>
                            </div>
                            <div class="profile-details">
                                <p><strong>Email:</strong> <span id="profileEmail">john.doe@student.edu</span></p>
                                <p><strong>Phone:</strong> <span id="profilePhone">+1 234 567 8900</span></p>
                                <p><strong>Hostel:</strong> <span id="profileHostel">Not set</span></p>
                                <p><strong>Instagram:</strong> <span id="profileInstagram">Not set</span></p>
                                <p><strong>Public ID:</strong> <span id="profilePublicId">-</span></p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right Side: User's Items -->
                    <div class="profile-section-right">
                        <h3>My Reported Items</h3>
                        <p id="userItemsState" class="items-state">Loading your items...</p>
                        <div class="items-grid" id="userItemsGrid">
                            <!-- User's items will be displayed here -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="static/js/main.js"></script>
</body>

</html>
